<!doctype html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Global Economy Dashboard</title>
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
  <main class="container">
    <header>
      <h1>داشبورد داده‌های اقتصاد جهانی</h1>
      <p>نمایش وضعیت منابع، شاخص‌ها و قابل‌مشاهده بودن داده‌ها (IMF/OECD/FRED/...)</p>
    </header>

    <section class="cards">
      <article class="card"><h3>کل شاخص‌ها</h3><p id="totalIndicators">-</p></article>
      <article class="card"><h3>شاخص‌های دارای داده</h3><p id="withData">-</p></article>
      <article class="card"><h3>کل رکوردها</h3><p id="totalPoints">-</p></article>
      <article class="card"><h3>آخرین بروزرسانی</h3><p id="generatedAt">-</p></article>
    </section>

    <section class="panel">
      <h2>تفکیک منابع</h2>
      <table><thead><tr><th>منبع</th><th>تعداد شاخص</th><th>شاخص دارای داده</th></tr></thead><tbody id="sourceRows"></tbody></table>
    </section>

    <section class="panel">
      <div class="row">
        <h2>لیست شاخص‌ها</h2>
        <label>منبع: <select id="sourceFilter"><option value="">همه</option></select></label>
        <label><input type="checkbox" id="withDataOnly" /> فقط دارای داده</label>
        <button id="reloadBtn">بارگذاری</button>
      </div>
      <table><thead><tr><th>نماد</th><th>نام</th><th>منبع</th><th>فرکانس</th><th>تعداد داده</th><th>وضعیت</th></tr></thead><tbody id="symbolRows"></tbody></table>
    </section>
  </main>
  <script src="/static/app.js"></script>
</body>
</html>
